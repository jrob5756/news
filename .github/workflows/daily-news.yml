name: Daily News Digest

on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch:

jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 70

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 10

      - uses: astral-sh/setup-uv@v4

      - name: Install conductor
        run: uv tool install conductor-cli@git+https://github.com/microsoft/conductor.git

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Run news digest workflow
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash workflows/scripts/run.sh --no-interactive --skip-gates --log-file auto

      - name: Commit and push report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Update the latest report link in README
          REPORT_PATH="reports/$(date +%Y/%m/%d).md"
          sed -i "s|📰 \*\*\[Latest Report\](.*)\*\*|📰 **[Latest Report](${REPORT_PATH})**|" README.md

          git add reports/ README.md
          git diff --cached --quiet || git commit -m "Add daily news report for $(date +%Y-%m-%d)"
          git push
